<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS STUDIOS | Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #050505; --primary: #00f3ff; --secondary: #7000ff;
            --text-main: #ffffff; --text-muted: #8b9bb4;
            --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Rajdhani', sans-serif; }
        h1, h2, h3 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; }
        a { text-decoration: none; color: white; transition: 0.3s; }

        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(0,243,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,243,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px; z-index: -1;
            mask-image: radial-gradient(circle at center, black 30%, transparent 70%);
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; position: fixed; width: 100%; top: 0;
            background: rgba(5,5,5,0.85); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 100;
        }
        .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: 2px; cursor: pointer; }
        .logo span { color: var(--primary); }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { color: var(--text-muted); font-weight: 600; padding: 5px 10px; border-radius: 4px; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        .page-content { padding: 120px 5% 80px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        .section-title { text-align: center; font-size: 2.5rem; margin-bottom: 20px; }
        .section-subtitle { text-align: center; color: var(--text-muted); margin-bottom: 50px; font-size: 1.1rem; }

        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 1000px; width: 100%; }

        .contact-card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px; padding: 35px 25px; text-align: center; transition: 0.4s;
            cursor: pointer; display: block;
        }
        .contact-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,243,255,0.1); }

        .contact-card i { font-size: 2.5rem; margin-bottom: 15px; color: var(--primary); }
        .contact-card h3 { font-size: 1.2rem; margin-bottom: 8px; }
        .contact-card p { color: var(--text-muted); font-size: 0.9rem; }

        .form-section { max-width: 600px; width: 100%; margin-top: 60px; }
        .form-section h2 { text-align: center; margin-bottom: 30px; font-size: 1.5rem; color: var(--text-muted); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-weight: 600; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 14px 18px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03); color: white; font-family: 'Rajdhani', sans-serif;
            font-size: 1rem; transition: 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 10px rgba(0,243,255,0.1); }
        .form-group textarea { min-height: 120px; resize: vertical; }

        .submit-btn {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            background: var(--gradient); color: white; font-family: 'Orbitron', sans-serif;
            font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.3s;
        }
        .submit-btn:hover { transform: scale(1.02); box-shadow: 0 5px 20px rgba(0,243,255,0.3); }

        footer { text-align: center; padding: 30px; color: #333; font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.05); }

        @media (max-width: 768px) {
            .section-title { font-size: 1.8rem; }
            .nav-links { gap: 10px; }
            .nav-links a { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <nav>
        <div class="logo" onclick="window.location='index.html'">NAUFAL <span>STUDIOS</span></div>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="game.html">GAMES</a>
            <a href="creator.html">CREATOR</a>
            <a href="contact.html" class="active">CONTACT</a>
        </div>
    </nav>

    <div class="page-content">
        <h1 class="section-title">Get In Touch</h1>
        <p class="section-subtitle">Ada pertanyaan atau ingin berkolaborasi? Hubungi kami!</p>

        <div class="contact-grid">
            <a href="https://wa.me/6281234567890" target="_blank" class="contact-card">
                <i class="fab fa-whatsapp"></i>
                <h3>WhatsApp</h3>
                <p>Chat langsung dengan kami</p>
            </a>
            <a href="https://instagram.com/username" target="_blank" class="contact-card">
                <i class="fab fa-instagram"></i>
                <h3>Instagram</h3>
                <p>Follow untuk update terbaru</p>
            </a>
            <a href="mailto:email@example.com" class="contact-card">
                <i class="fas fa-envelope"></i>
                <h3>Email</h3>
                <p>Kirim pesan via email</p>
            </a>
        </div>

        <div class="form-section">
            <h2>Kirim Pesan</h2>
            <form id="contactForm">
                <div class="form-group">
                    <label>Nama</label>
                    <input type="text" placeholder="Nama kamu..." required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label>Pesan</label>
                    <textarea placeholder="Tulis pesan kamu di sini..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">KIRIM PESAN <i class="fas fa-paper-plane"></i></button>
            </form>
        </div>
    </div>

    <footer>&copy; 2026 Naufal Studios. All rights reserved.</footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Pesan berhasil dikirim! Terima kasih telah menghubungi kami.');
            this.reset();
        });
    </script>
</body>
</html>
